syntax = "proto3";

package learn_media.grpcdemo;

// 视频帧抓取服务 —— 接收视频帧并返回确认
service VideoFrameIngest {
  // 一元 RPC：发送单帧
  rpc SendFrame(FrameRequest) returns (FrameAck);
  // 客户端流式 RPC：批量发送帧流
  rpc SendFrameStream(stream FrameRequest) returns (FrameAck);
}

// 帧请求消息：包含视频帧的元数据和图片数据
message FrameRequest {
  string video_id = 1;                // 视频唯一标识
  uint64 frame_index = 2;             // 帧序号（从 0 开始）
  int64 timestamp_ms = 3;             // 帧时间戳（毫秒）
  string image_format = 4;            // 图片格式（如 png、jpeg）
  bytes image_data = 5;               // 图片二进制数据
  int32 width = 6;                    // 图片宽度（像素）
  int32 height = 7;                   // 图片高度（像素）
  string prompt = 8;                  // 与该帧相关的文本提示
  map<string, string> metadata = 9;   // 自定义元数据键值对
  uint32 schema_version = 10;         // 协议版本号，用于兼容性检查
}

// 帧确认消息：服务端处理结果
message FrameAck {
  bool ok = 1;                 // 是否成功处理
  string message = 2;          // 处理结果描述
  string frame_id = 3;         // 对应的帧标识（video_id:frame_index）
  uint64 received_bytes = 4;   // 服务端接收到的字节数
  int64 server_time_ms = 5;    // 服务端处理时间戳（毫秒）
}
